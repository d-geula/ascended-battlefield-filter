<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ascended Battlefield Filter Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Ascended Battlefield Filter</h1>

      <label class="setting">
        <input id="deImageify" type="checkbox">
        <span>
          <strong>De-imageify numeric values</strong>
          <small>Replace supported GateWars number images with selectable text.</small>
        </span>
      </label>

      <p id="status" role="status" aria-live="polite"></p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
